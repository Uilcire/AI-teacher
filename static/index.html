<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Teacher</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <main class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-2xl space-y-8">
            <div class="text-center">
                <h1 class="text-4xl font-bold text-gray-900 mb-3">AI Teacher</h1>
                <p class="text-lg text-gray-600">
                    Enter a topic or upload a document, and your AI teacher will guide
                    you through an interactive learning conversation.
                </p>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-6">
                <!-- Topic Input -->
                <div>
                    <label for="topic" class="block text-sm font-medium text-gray-700 mb-2">
                        Topic or Text
                    </label>
                    <textarea
                        id="topic"
                        placeholder="Enter a topic to learn about (e.g., 'Quantum entanglement') or paste an essay, article, or any text you'd like to understand better..."
                        class="w-full h-40 p-4 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-900 placeholder-gray-400"
                    ></textarea>
                </div>

                <!-- Divider -->
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="bg-white px-3 text-gray-500">and / or</span>
                    </div>
                </div>

                <!-- Document Upload -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Upload Document (optional)
                    </label>
                    <div
                        id="drop-zone"
                        class="border-2 border-dashed rounded-lg p-8 text-center cursor-pointer transition-colors border-gray-300 hover:border-gray-400"
                    >
                        <input type="file" id="file-input" accept=".pdf,.docx,.txt" class="hidden" />
                        <div id="upload-default" class="text-gray-500">
                            <svg class="w-8 h-8 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                            <p class="font-medium">Drop a file here or click to upload</p>
                            <p class="text-sm mt-1">PDF, DOCX, or TXT (max 10MB)</p>
                        </div>
                        <div id="upload-loading" class="text-gray-500 hidden">
                            <div class="animate-spin inline-block w-6 h-6 border-2 border-gray-300 border-t-blue-500 rounded-full mb-2"></div>
                            <p>Processing document...</p>
                        </div>
                        <div id="upload-success" class="text-green-600 hidden">
                            <svg class="w-8 h-8 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                            <p class="font-medium" id="uploaded-filename"></p>
                            <p class="text-sm text-gray-500 mt-1">Text extracted successfully</p>
                        </div>
                    </div>
                    <p id="upload-error" class="mt-2 text-sm text-red-600 hidden"></p>
                </div>

                <!-- Start Button -->
                <button
                    id="start-btn"
                    disabled
                    class="w-full py-3 px-6 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors"
                >
                    Start Learning
                </button>
            </div>
        </div>
    </main>

    <script>
        const topicInput = document.getElementById('topic');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const startBtn = document.getElementById('start-btn');
        const uploadDefault = document.getElementById('upload-default');
        const uploadLoading = document.getElementById('upload-loading');
        const uploadSuccess = document.getElementById('upload-success');
        const uploadError = document.getElementById('upload-error');
        const uploadedFilename = document.getElementById('uploaded-filename');

        let documentText = null;
        let documentName = null;

        function updateStartButton() {
            startBtn.disabled = !(topicInput.value.trim() || documentText);
        }

        topicInput.addEventListener('input', updateStartButton);

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-blue-50');
            dropZone.classList.remove('border-gray-300');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            dropZone.classList.add('border-gray-300');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            dropZone.classList.add('border-gray-300');
            const file = e.dataTransfer.files[0];
            if (file) uploadFile(file);
        });
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) uploadFile(file);
        });

        async function uploadFile(file) {
            uploadError.classList.add('hidden');
            uploadDefault.classList.add('hidden');
            uploadSuccess.classList.add('hidden');
            uploadLoading.classList.remove('hidden');

            try {
                const formData = new FormData();
                formData.append('file', file);
                const response = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Upload failed');

                documentText = data.text;
                documentName = data.filename;
                uploadedFilename.textContent = data.filename;
                uploadLoading.classList.add('hidden');
                uploadSuccess.classList.remove('hidden');
                updateStartButton();
            } catch (e) {
                uploadLoading.classList.add('hidden');
                uploadDefault.classList.remove('hidden');
                uploadError.textContent = e.message;
                uploadError.classList.remove('hidden');
                documentText = null;
                documentName = null;
                updateStartButton();
            }
        }

        startBtn.addEventListener('click', () => {
            const topic = topicInput.value.trim();
            if (!topic && !documentText) return;

            sessionStorage.setItem('ai-teacher-session', JSON.stringify({
                topic: topic || undefined,
                sourceText: documentText || undefined,
                documentName: documentName || undefined,
            }));
            window.location.href = '/chat';
        });
    </script>
</body>
</html>
